name: CI

on:
  push:
    branches:
      - master
      - phase-1-cli
  pull_request:

jobs:
  test:
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install bats-core
        run: brew install bats-core

      - name: Install Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Syntax check (zsh CLI)
        run: zsh -n bin/mcplayer

      - name: Syntax check (Bun adapter)
        run: bun --version

      - name: Run bats suite
        run: bats tests
